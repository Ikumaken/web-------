<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>精度保証アプリ（開発中）</title>
    <style>
        body { font-family: sans-serif; margin: 30px; }
        .result-box { margin-top: 20px; padding: 15px; border: 1px solid #ccc; background-color: #f9f9f9; }
        .item { margin-bottom: 8px; }
    </style>
</head>
<body>
    <h1>精度保証計算アプリ</h1>
    
    <div class="item">
        <label for="num-input">検証したい数値を入力：</label>
        <input type="number" id="num-input" step="any" value="0.1">
    </div>
    
    <button id="calc-btn" style="margin-top: 10px; padding: 5px 10px;">計算実行</button>
    
    <div class="result-box">
        <h3>【計算結果】</h3>
        <div id="result">ここに結果が表示されます</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
